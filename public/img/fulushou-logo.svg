<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Outer octagon frame -->
  <path d="M62,8 L138,8 L192,62 L192,138 L138,192 L62,192 L8,138 L8,62 Z"
    stroke="#1C72BE" stroke-width="12" fill="none" stroke-linejoin="miter"/>
  <!-- Inner circle ring -->
  <circle cx="100" cy="100" r="61" stroke="#1C72BE" stroke-width="10" fill="none"/>
  <!--
    Inner mark: 4 symmetric C-shaped arms, each opening toward the center.
    Each arm tip reaches r=56 (circle inner edge). Center opening: 30x30 square.
    Top arm (∩): shoulders at (85,59)-(115,59), arc up to (100,44)
    Bottom arm (∪): shoulders at (85,141)-(115,141), arc down to (100,156)
    Left arm: shoulders at (59,85)-(59,115), arc left to (44,100)
    Right arm: shoulders at (141,85)-(141,115), arc right to (156,100)
  -->
  <!-- Top arm -->
  <path d="M85,85 L85,59 A15,15 0 0,0 115,59 L115,85 Z" fill="#1C72BE"/>
  <!-- Bottom arm -->
  <path d="M85,115 L85,141 A15,15 0 0,1 115,141 L115,115 Z" fill="#1C72BE"/>
  <!-- Left arm -->
  <path d="M85,85 L59,85 A15,15 0 0,0 59,115 L85,115 Z" fill="#1C72BE"/>
  <!-- Right arm -->
  <path d="M115,85 L141,85 A15,15 0 0,1 141,115 L115,115 Z" fill="#1C72BE"/>
</svg>
