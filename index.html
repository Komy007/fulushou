<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/img/fulushou-logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Fu Lu Shou F&amp;B Co., Ltd. | Cambodia's #1 F&amp;B Distribution Company</title>
  <meta name="description"
    content="Fu Lu Shou F&amp;B Co., Ltd. is Cambodia's #1 F&amp;B import and distribution company. 15+ years of experience distributing Bacchus, Pocari Sweat, Shin Ramyun, and Olatte nationwide." />
  <meta name="keywords"
    content="Fu Lu Shou, Cambodia, F&B, distribution, Bacchus, Pocari Sweat, Shin Ramyun, Olatte, import, export, energy drink, Phnom Penh" />
  <meta name="author" content="Fu Lu Shou F&amp;B Co., Ltd." />
  <meta name="robots" content="index, follow" />

  <!-- Security Headers (meta fallbacks) -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <!-- Open Graph / Social Sharing -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Fu Lu Shou F&amp;B Co., Ltd. | Cambodia F&amp;B Distribution Leader" />
  <meta property="og:description"
    content="15+ years of success in Cambodia. #1 Energy Drink market share. 150+ employees. 24 sub-distributors nationwide." />
  <meta property="og:image" content="https://fulushou.net/img/fulushou-logo.svg" />
  <meta property="og:url" content="https://fulushou.net" />
  <meta property="og:site_name" content="Fu Lu Shou F&amp;B Co., Ltd." />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Fu Lu Shou F&amp;B Co., Ltd." />
  <meta name="twitter:description" content="Cambodia's #1 F&amp;B Distribution Company" />

  <!-- Mobile browser chrome color -->
  <meta name="theme-color" content="#FAF6EF" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <!-- DNS prefetch / preconnect for external resources -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.tailwindcss.com" />
  <link rel="dns-prefetch" href="https://esm.sh" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream:  '#FAF6EF',
            ink:    '#15201B',
            forest: '#0E5F3F',
            citrus: '#FF5C28',
            gold:   '#C9A227',
            mist:   '#E8EFE9',
          },
          fontFamily: {
            display: ['"Archivo"', '"Noto Sans KR"', 'sans-serif'],
            sans: ['"Noto Sans KR"', '"Noto Sans Khmer"', '"Noto Sans SC"', 'sans-serif'],
            serif: ['"Noto Serif KR"', 'serif'],
          },
          animation: {
            'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'fade-in': 'fadeIn 0.8s ease-out forwards',
            'spin-slow': 'spin 8s linear infinite',
            'gradient-x': 'gradientX 15s ease infinite',
            'bounce-gentle': 'bounceGentle 2s ease-in-out infinite',
            'shimmer': 'shimmer 2.5s infinite linear',
            'marquee': 'marquee 30s linear infinite',
            'marquee-reverse': 'marqueeReverse 32s linear infinite',
            'count-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(30px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            gradientX: {
              '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
              '50%': { 'background-size': '200% 200%', 'background-position': 'right center' },
            },
            bounceGentle: {
              '0%, 100%': { transform: 'translateY(-5%) translateX(-50%)' },
              '50%': { transform: 'translateY(0) translateX(-50%)' },
            },
            shimmer: {
              '0%': { transform: 'translateX(-100%)' },
              '100%': { transform: 'translateX(100%)' },
            },
            marquee: {
              '0%': { transform: 'translateX(0%)' },
              '100%': { transform: 'translateX(-50%)' },
            },
            marqueeReverse: {
              '0%': { transform: 'translateX(-50%)' },
              '100%': { transform: 'translateX(0%)' },
            },
          }
        },
      },
    }
  </script>
  <!-- Fonts: Korean, Khmer, Chinese -->
  <link
    href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+Khmer:wght@300;400;500;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap"
    rel="stylesheet">
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "recharts": "https://esm.sh/recharts@^3.6.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-cream text-ink antialiased">

  <script type="module" src="/index.tsx"></script>
</body>

</html>
